[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "crude"
version = "0.1.0"
description = "CRUD-Engine: a lightweight CLI for read/write access to one's own data on sites without a usable public API (ATDW, Skål)"
requires-python = ">=3.9"
dependencies = [
    "typer[all]>=0.9",
    "requests>=2.31",
    "tomli>=2.0; python_version < '3.11'",
    "tomli_w>=1.0",
]

[project.scripts]
crude-atdw = "crude_atdw.cli:app"
crude-skal = "crude_skal.cli:app"
crude-rezdy = "crude_rezdy.cli:app"

[tool.setuptools.packages.find]
where = ["src"]
