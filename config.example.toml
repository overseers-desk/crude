# crude configuration. Copy to ~/.config/crude/config.toml (or the repo root for
# development) and fill in your credentials. One file holds every site's section.

[atdw]
username = "your-email@example.com"
password = "your-password"

[skal]
username = "your-email@example.com"
password = "your-password"
# session_id is cached automatically after `crude-skal login`.

[rezdy]
api_key = "your-rezdy-supplier-api-key"
timezone = "Australia/Brisbane"  # required (IANA name): rezdy reads every typed
                                 # date as this account's operational day.
# environment = "production"  # or "staging"; defaults to production

[sonas]
username = "your-email@example.com"
password_hash = "sha256-hex-of-your-password"  # printf '%s' 'PASSWORD' | sha256sum | cut -d' ' -f1
# fingerprint = "..."  # optional device id (Meteor fpIds); a default is built in. A new
#                      # device triggers a one-time verification email; see docs/sonas.md.
# tenant = "..."       # optional; auto-discovered from your user record otherwise.

[xero]
client_id = "your-xero-app-client-id"
client_secret = "your-xero-app-client-secret"
redirect_uri = "http://localhost:8910/callback"  # must match a redirect URI registered on the Xero app
# scopes = "offline_access accounting.transactions accounting.contacts accounting.settings"  # the consent set; .read suffixes for read-only
# default_tenant = "..."  # optional; pin one organisation when the login reaches several (else use --tenant)
# Run `crude-xero auth` once to grant access; tokens cache in ~/.local/state/crude/xero_token.json and refresh automatically.

[airwallex]
client_id = "your-airwallex-client-id"
api_key = "your-airwallex-api-key"  # generate both under Developer > API keys in the Airwallex console
# environment = "demo"   # optional; "demo"/"sandbox" hits api-demo.airwallex.com, else production
# on_behalf_of = "..."   # optional; a connected-account id for platform (Scale) accounts
# The bearer is fetched on first use and cached in ~/.local/state/crude/airwallex_token.json (re-logs-in on expiry).

# Multiple accounts on one site
# -----------------------------
# The bare [site] section above is the "default" account. Hold a second account on
# the same site (different country, credentials, timezone) as a [site.<name>]
# subtable, and select it with --account/-a before the resource (or $CRUDE_ACCOUNT):
#
#   crude-rezdy booking cancellations --from 2026-05-03               # default account
#   crude-rezdy --account es booking cancellations --from 2026-05-03  # the [rezdy.es] account
#
# [rezdy.es]
# api_key = "your-spain-rezdy-supplier-api-key"
# timezone = "Europe/Madrid"  # required, as on the default account
